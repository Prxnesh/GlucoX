version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: diasense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diasense
      POSTGRES_USER: diasense
      POSTGRES_PASSWORD: diasense
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

